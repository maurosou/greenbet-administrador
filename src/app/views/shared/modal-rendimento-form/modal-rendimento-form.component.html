<h2 mat-dialog-title>Novo Rendimento</h2>
<mat-dialog-content *ngIf="carregando">
	<app-carregando></app-carregando>
</mat-dialog-content>
<mat-dialog-content class="mat-typography pt-4" *ngIf="!carregando">
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Valor (Percentual do dia %)</mat-label>
		<input matInput [(ngModel)]="model.valor" mask="separator.2" />
	</mat-form-field>
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Data</mat-label>
		<input matInput [matDatepicker]="picker" [(ngModel)]="model.data" />
		<mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
		<mat-datepicker #picker></mat-datepicker>
	</mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end" *ngIf="!carregando">
	<button mat-button (click)="fechar()">Cancelar</button>
	<button mat-button class="bg-light-success text-success" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
