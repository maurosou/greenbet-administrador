<h2 mat-dialog-title>Alterar observação</h2>

<mat-dialog-content *ngIf="carregando">
	<div class="py-3">Salvando...</div>
</mat-dialog-content>

<mat-dialog-content class="mat-typography" *ngIf="!carregando">
	<mat-form-field appearance="outline" class="w-100 pt-3">
		<mat-label>Observação</mat-label>
		<textarea matInput rows="5" maxlength="500" [(ngModel)]="observacao" placeholder="Digite a observação..."></textarea>
		<mat-hint align="end">{{ observacao.length || 0 }}/500</mat-hint>
	</mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" *ngIf="!carregando">
	<button mat-button (click)="fechar()">Cancelar</button>
	<button mat-flat-button color="primary" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
