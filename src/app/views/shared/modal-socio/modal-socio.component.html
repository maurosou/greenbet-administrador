<h2 mat-dialog-title>Sócio</h2>
<mat-dialog-content *ngIf="carregando">
	<app-carregando></app-carregando>
</mat-dialog-content>
<mat-dialog-content class="mat-typography pt-4" *ngIf="!carregando">
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Nome</mat-label>
		<input matInput [(ngModel)]="model!.nome" />
	</mat-form-field>
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Carteira</mat-label>
		<input matInput [(ngModel)]="model!.carteira" />
	</mat-form-field>
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Percentual do ganho sobre o contato</mat-label>
		<input matInput [(ngModel)]="model!.percentual" mask="separator.2" />
	</mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end" *ngIf="!carregando">
	<button mat-button (click)="fechar()">Cancelar</button>
	<button mat-button class="bg-light-success text-success" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
