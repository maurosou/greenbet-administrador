<h2 mat-dialog-title>Remover Saldo</h2>
<mat-dialog-content *ngIf="carregando">
	<app-carregando></app-carregando>
</mat-dialog-content>
<mat-dialog-content class="mat-typography pt-4" *ngIf="!carregando">
	<mat-form-field appearance="outline" class="w-100">
		<mat-label>Valor</mat-label>
		<input matInput [(ngModel)]="valor" mask="separator.2" />
	</mat-form-field>
	<mat-form-field appearance="outline" class="w-100 mt-2">
		<mat-label>Tipo</mat-label>
		<mat-select [(ngModel)]="tipo">
			<mat-option [value]="'rendimento'">Rendimento</mat-option>
			<mat-option [value]="'bonus'">Bônus</mat-option>
		</mat-select>
	</mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end" *ngIf="!carregando">
	<button mat-button (click)="fechar()">Cancelar</button>
	<button mat-button class="bg-light-success text-success" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
