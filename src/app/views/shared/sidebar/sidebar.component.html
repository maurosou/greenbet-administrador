<div class="deznav-scroll dz-scroll">
	<ul class="metismenu" id="menu">

		<ng-container *ngFor="let menu of menuItems">
			<li *ngFor="let item of menu.items">
				<a (click)="irPara(item.url)" role="button" class="ai-icon" aria-expanded="false">
					<i [class]="item.icone"></i>
					<span class="nav-text">{{item.nome}}</span>
				</a>
			</li>
		</ng-container>



	</ul>
</div>





<div class="branding">
	<a href="/">
		<img src="./assets/images/logo.png" class="align-middle m-2 admin-logo" alt="logo" width="150" />
	</a>
</div>

<div class="d-flex flex-column" style="height: calc(100% - 80px)">
	<div class="flex-fill">
		<ng-scrollbar class="position-relative" style="height: 100%">
			<mat-nav-list class="sidebar-list">
				<ng-container *ngFor="let menu of menuItems">
					<div mat-subheader class="nav-caption">
						{{ menu.grupo }}
					</div>
					<a mat-list-item [ngClass]="{
							'mat-toolbar mat-primary activeMenu': router.isActive(item.url, true)
						}" class="menu-list-item" *ngFor="let item of menu.items" (click)="irPara(item.url)">
						<i-tabler style="margin-top: -8px !important" class="routeIcon" name="{{ item.icone }}"
							matListItemIcon></i-tabler>
						<span class="hide-menu">{{ item.nome }}</span>
					</a>
				</ng-container>
			</mat-nav-list>
		</ng-scrollbar>
	</div>

	<div class="p-24 m-t-auto profile-bar">
		<app-box-menu-usuario></app-box-menu-usuario>
	</div>
</div>
