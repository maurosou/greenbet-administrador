<app-titulo titulo="Sócios"></app-titulo>

<app-carregando *ngIf="carregando"></app-carregando>

<div class="card" *ngIf="!carregando">
	<div class="card-header">
		<div class="d-flex justify-content-between w-100">
			<mat-card-title class="m-b-0">
				<span>Lista</span>
			</mat-card-title>
		</div>
		<button mat-fab extended color="primary" (click)="novo()">
			<mat-icon>add</mat-icon>
			Novo
		</button>
	</div>
	<div class="card-body" *ngIf="lista.length > 0">
		<div class="table-responsive">
			<table mat-table [dataSource]="lista" class="table table-striped">

				<ng-container matColumnDef="nome">
					<th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 mat-subtitle-1">Nome</th>
					<td mat-cell *matCellDef="let element" class="mat-body-1">{{ element.nome }}</td>
				</ng-container>

				<ng-container matColumnDef="percentual">
					<th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 mat-subtitle-1">Percentual</th>
					<td mat-cell *matCellDef="let element" class="mat-body-1">{{ element.percentual }}%</td>
				</ng-container>

				<ng-container matColumnDef="carteira">
					<th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 mat-subtitle-1">Receber em</th>
					<td mat-cell *matCellDef="let element" class="mat-body-1">{{ element.carteira }}</td>
				</ng-container>

				<ng-container matColumnDef="acoes">
					<th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 mat-subtitle-1"></th>
					<td mat-cell *matCellDef="let element" class="mat-body-1 text-end">
						<button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
							<mat-icon>
								<i-tabler name="dots" class="icon-20"></i-tabler>
							</mat-icon>
						</button>
						<mat-menu #menu="matMenu" class="cardWithShadow">
							<button mat-menu-item (click)="editar(element)">
								<mat-icon>edit</mat-icon>
								<span>Editar</span>
							</button>
							<button mat-menu-item (click)="excluir(element)">
								<mat-icon>close</mat-icon>
								<span>Excluir</span>
							</button>
						</mat-menu>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
			</table>
		</div>
	</div>
	<div class="card-footer" *ngIf="lista.length == 0">
		<app-lista-vazia></app-lista-vazia>
	</div>
</div>
